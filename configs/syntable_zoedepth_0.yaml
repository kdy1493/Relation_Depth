# Experiment: syntable_zoedepth_0
# Model: ZoeDepth (single metric head) — official implementation from
#   https://github.com/isl-org/ZoeDepth
# ZoeDepth sources are vendored under src/zoedepth/vendor/ (no separate clone).
#
# Run (single GPU):
#   python scripts/zoedepth/train_zoedepth.py -c configs/syntable_zoedepth_0.yaml 2>&1 | tee syntable_zoedepth_0.log
#
# Run (multi GPU):
#   torchrun --nproc_per_node=2 scripts/zoedepth/train_zoedepth.py -c configs/syntable_zoedepth_0.yaml 2>&1 | tee syntable_zoedepth_0.log
#
# Eval:
#   python scripts/zoedepth/eval_zoedepth.py -c configs/syntable_zoedepth_0.yaml \
#     --checkpoint runs/syntable_zoedepth_0/checkpoints/best.pth --scale-align-eval

data:
  train_list: data/syntable/lists/syntable_train.txt
  val_list: data/syntable/lists/syntable_val.txt
  list_root: null
  depth_scale: 1000.0

model:
  version_name: v1
  midas_model_type: DPT_BEiT_L_384
  n_bins: 64
  bin_centers_type: softplus
  bin_embedding_dim: 128
  n_attractors: [16, 8, 4, 1]
  attractor_alpha: 1000
  attractor_gamma: 2
  attractor_kind: mean
  attractor_type: inv
  min_depth: 0.001
  max_depth: 12.0
  min_temp: 0.0212
  max_temp: 50.0
  inverse_midas: false
  memory_efficient: true
  output_distribution: logbinomial
  # Full ZoeDepth weights (NYU indoor). Omit or set null to train decoder from scratch with MiDaS backbone only.
  pretrained_from: "url::https://github.com/isl-org/ZoeDepth/releases/download/v1.0/ZoeD_M12_N.pt"
  train_midas: true
  use_pretrained_midas: true
  freeze_midas_bn: true
  midas_lr_factor: 1.0
  encoder_lr_factor: 10.0
  pos_enc_lr_factor: 10.0
  force_keep_ar: true
  resume_from: null

training:
  # Multiple of 32 recommended for MiDaS prep inside ZoeDepth.
  img_size: 518
  epochs: 50
  # 2GPU 기준 effective batch=28: per_gpu_bs(2) x grad_accum(7) x ngpu(2)
  batch_size: 2
  lr: 1.61e-4
  weight_decay: 0.01
  num_workers: 4
  seed: 0
  find_unused_parameters: true
  eval_freq: 2
  grad_accum_steps: 7
  # AMP enabled: backbone (MiDaS/BEiT) runs in fp16 for speed; metric head runs in
  # fp32 inside the model forward to avoid Softplus/log-binomial NaN overflow.
  amp: true
  patience: null
  ema_decay: 0.9998
  monitor_metric: abs_rel
  monitor_mode: min
  auto_batch_size: false
  scale_align_eval: false

device:
  cuda_visible_devices: [3,4]

output:
  save_path: runs/syntable_zoedepth_0

distributed:
  port: null
